openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: mentor
    description: AI Mentor chat
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /mentor/chat:
    post:
      operationId: mentorChat
      tags: [mentor]
      summary: Send a chat message to the AI mentor and get a reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorChatRequest"
      responses:
        "200":
          description: Mentor reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorReply"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MentorChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    MentorChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MentorChatMessage"
        examTarget:
          type: string
        studentName:
          type: string
      required:
        - messages
    MentorReply:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply
    MentorError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

